<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Components | Hi</title>
    <link rel="icon" href="/public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      href="/font/woff2/PretendardVariable.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" as="style" href="/font/pretendardvariable.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <!-- ================= -->
    <!--   Login 컴포넌트   -->
    <!-- ================= -->
    <div class="w-screen h-screen flex justify-center items-center">
      <div class="w-[30rem] p-7">
        <!-- 로고 -->
        <a href="/">
          <img
            src="../assets/svg/logo_black.svg"
            alt="로고"
            class="lg:w-(--logo-sm-size) lg:h-(--logo-sm-size) w-[3.125rem] h-[3.125rem]] m-auto my-10 cursor-pointer"
          />
        </a>
        <!-- 로그인 폼 -->
        <form action="#">
          <!-- 이메일 Input -->
          <label for="email">
            <input
              type="email"
              placeholder="이메일"
              required
              class="w-full max-w-(--input-width) h-[3.125rem] lg:h-(--input-height) border-2 border-gray-300 rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none"
            />
          </label>
          <!-- 비밀번호 Input -->
          <label for="password" class="block">
            <input
              type="password"
              placeholder="비밀번호"
              required
              class="w-full max-w-(--input-width) h-[3.125rem] lg:h-(--input-height) border-2 border-gray-300 rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none"
            />
          </label>
          <!-- 비밀번호 재설정, 회원가입 요소 -->
          <div
            class="flex justify-between mt-2 mb-2 text-[#928989] font-light text-[.875rem] lg:text-[1rem]"
          >
            <a href="#">비밀번호 재설정</a>
            <a href="#">회원가입</a>
          </div>
          <!-- 로그인 버튼 -->
          <button
            type="submit"
            class="w-full max-w-(--login-btn-width) h-(--sign-up-btn-height) lg:h-(--form-btn-height) bg-main text-[#fff] rounded-(--btn-radius) text-[1.25rem] lg:text-[1.875rem] font-bold hover:cursor-pointer"
          >
            로그인
          </button>
        </form>
        <!-- SNS 로그인 요소 -->
        <div class="mt-10">
          <h6
            class="text-center text-[#928989] font-light text-[.875rem] lg:text-[1rem]"
          >
            SNS 계정으로 간편 로그인 및 회원가입
          </h6>
          <div class="flex justify-center mt-5">
            <img
              class="mx-3 hover:cursor-pointer w-[2.5rem] lg:w-[3.125rem]"
              src="../assets/svg/icon_facebook.svg"
              alt="페이스북"
            />
            <img
              class="mx-3 hover:cursor-pointer w-[2.5rem] lg:w-[3.125rem]"
              src="../assets/svg/icon_kakao.svg"
              alt="카카오톡"
            />
            <img
              class="mx-3 hover:cursor-pointer w-[2.5rem] lg:w-[3.125rem]"
              src="../assets/svg/icon_naver.svg"
              alt="네이버"
            />
          </div>
        </div>
      </div>
    </div>
    <!-- ================ -->
    <!-- ================ -->

    <!-- ================= -->
    <!--  Sign-up 컴포넌트  -->
    <!-- ================= -->
    <div class="w-screen h-full flex justify-center items-center">
      <div class="p-7">
        <!-- 로고 -->
        <a href="/">
          <img
            src="../assets/svg/logo_black.svg"
            alt="로고"
            class="w-[3.125rem] h-[3.125rem] lg:w-(--logo-sm-size) lg:h-(--logo-sm-size) m-auto mb-10 hover:cursor-pointer"
          />
        </a>
        <!-- 회원가입 폼 -->
        <form action="#" class="lg:w-[34.375rem]">
          <!-- 이메일 Input -->
          <label
            for="email"
            class="text-main font-bold text-[1.25rem] lg:text-[1.5625rem]"
            >이메일</label
          >
          <div class="">
            <input
              type="email"
              placeholder="이메일"
              name="email"
              id="email"
              required
              class="w-full max-w-(--input-width) min-w-[6rem] h-[3.125rem] lg:h-(--input-height) border-2 border-gray rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none"
            />
            <!-- 이메일 인증 Button -->
            <button
              type="button"
              class="w-full lg:w-(--sign-up-btn-width) h-[2.5rem] lg:h-(--sign-up-btn-height) bg-main text-white rounded-[.9375rem] lg:rounded-(--basic-radius) lg:ml-3 mt-1.5 font-bold lg:text-[1.25rem] hover:cursor-pointer"
            >
              인증
            </button>
          </div>
          <!-- 인증번호 Input -->
          <div class="">
            <input
              type="text"
              placeholder="인증번호"
              required
              class="w-full max-w-(--input-width) min-w-[100px] h-[3.125rem] lg:h-[3.75rem] border-2 border-gray rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none"
            />
            <!-- 인증번호 확인 Button -->
            <button
              type="button"
              class="w-full lg:w-(--sign-up-btn-width) h-[2.5rem] lg:h-(--sign-up-btn-height) bg-gray-400 text-white rounded-[.9375rem] lg:rounded-(--basic-radius) lg:ml-3 mt-1.5 font-bold lg:text-[1.25rem] hover:cursor-pointer"
            >
              확인
            </button>
          </div>
          <!-- 비밀번호 Input -->
          <div class="mt-15">
            <label
              for="password"
              class="text-main font-bold text-[1.25rem] lg:text-[1.5625rem]"
              >비밀번호</label
            >
            <input
              type="password"
              placeholder="비밀번호"
              name="password"
              id="password"
              required
              class="w-full max-w-[var(--input-width)] min-w-[100px] h-[3.125rem] lg:h-(--input-height) border-2 border-gray rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none flex"
            />
            <!-- 비밀번호 확인 Input -->
            <input
              type="password"
              placeholder="비밀번호 확인"
              required
              class="w-full max-w-[var(--input-width)] min-w-[100px] h-[3.125rem] lg:h-(--input-height) border-2 border-gray rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none"
            />
          </div>
          <!-- 닉네임 Input -->
          <div class="mt-15">
            <label
              for="name"
              class="text-main font-bold text-[1.25rem] lg:text-[1.5625rem]"
              >닉네임</label
            >
            <div>
              <input
                type="text"
                placeholder="닉네임(2~10)자"
                name="name"
                id="name"
                minlength="2"
                maxlength="10"
                required
                class="w-full max-w-(--input-width) min-w-[100px] h-[3.125rem] lg:h-(--input-height) border-2 border-gray rounded-(--basic-radius) indent-4 mt-1.5 focus:border-main focus:outline-none"
              />
            </div>
          </div>
          <!-- 개인정보 동의 요소, Checkbox -->
          <div class="my-5 flex">
            <label for="private"></label>
            <input
              type="checkbox"
              name="private"
              id="private"
              required
              class="mr-1.5 w-5"
            />
            <span>
              <strong class="hover:cursor-pointer">개인정보 수집</strong> 및
              <strong class="hover:cursor-pointer">이용</strong>에 동의하십니까?
            </span>
          </div>
          <!-- 회원가입 Button -->
          <button
            type="submit"
            class="w-full max-w-(--form-btn-width) min-w-[6.25rem] h-[3.75rem] lg:h-(--form-btn-height) bg-main text-white rounded-(--basic-radius) text-[1.25rem] lg:text-[1.875rem] font-bold hover:cursor-pointer"
          >
            회원가입
          </button>
        </form>
      </div>
    </div>
    <!-- ===================== -->
    <!-- ===================== -->
  </body>
</html>
