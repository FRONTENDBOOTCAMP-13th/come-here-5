<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Components | Hi</title>
    <link rel="icon" href="/public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      href="/font/woff2/PretendardVariable.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" as="style" href="/font/pretendardvariable.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <!--===================================================================================================-->
    <!-- 팀 소개 페이지 컴포넌트 -->
    <!--===================================================================================================-->
    <h1 class="font-extrabold text-2xl mt-8">Team Page Hero</h1>
    <section
      class="team-hero bg-main px-8 py-[2.8125rem] flex justify-center gap-5 h-[200px] md:h-[350px]"
    >
      <div
        class="logo w-[6rem] content-center md:w-(--logo-big-size) lg:content-start shrink-0"
      >
        <img src="/src/assets/svg/logo_white.svg" alt="Hi logo" />
      </div>
      <div class="title text-white font-bold content-center lg:content-start">
        <div
          class="sub-title text-3xl md:text-[2.5rem] lg:text-team-hero-sub-title leading-[1.5]"
        >
          4명의 색다른 매력,
        </div>
        <div
          class="main-title text-4xl md:text-[3.4rem] md:pl-[5.75rem] lg:text-team-hero-title leading-[1.5]"
        >
          지금 소개합니다!
        </div>
      </div>
    </section>

    <h1 class="font-extrabold text-2xl mt-8">Team Page Introduce</h1>
    <section
      class="team-introduce flex justify-center md:gap-[3.5625rem] px-4 md:px-8 max-w-(--team-intro-max-width) h-(--team-intro-height) bg-[#AAC0FF] hover:bg-white rounded-(--basic-radius) shadow-(--basic-shadow) duration-500 ease-in-out"
    >
      <div class="character shrink-0">
        <img src="/src/assets/img/memo.png" alt="캐릭터" />
      </div>
      <div
        class="content text-xl md:text-team-introduce-content font-bold py-6"
      >
        5조 팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다. 5조
        팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다.
      </div>
    </section>
    <!--===================================================================================================-->
    <!--===================================================================================================-->

    <!--==========================-->
    <!--       헤더 컴포넌트       -->
    <!--==========================-->
    <header
      class="grid grid-cols-2 items-center max-w-[1024px] h-[70px] mx-auto px-4 bg-white"
    >
      <!-- 로고 -->
      <div class="flex items-center mr-20">
        <img
          src="/src/assets/svg/logo_black.svg"
          alt="Logo"
          class="w-[60px] h-[50px]"
        />
      </div>

      <!-- 햄버거 버튼 (모바일 전용) -->
      <button
        class="absolute top-2 right-4 lg:hidden flex items-center justify-center w-[40px] h-[70px]"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>

      <!-- 메뉴 -->
      <nav
        class="hidden lg:flex justify-end items-center space-x-14 text-black text-[20px] ml-20"
      >
        <a href="#" class="hover:opacity-70">Plan</a>
        <a href="#" class="hover:opacity-70">Team</a>
        <a
          href="#"
          class="font-semibold text-white bg-[#312F2F] hover:bg-[#205AFF] rounded-[20px] w-[90px] h-[40px] flex items-center justify-center text-[20px]"
        >
          Login
        </a>
      </nav>
    </header>
    <!--==========================-->
    <!--==========================-->

    <!--==========================-->
    <!--       푸터 컴포넌트       -->
    <!--==========================-->

    <footer class="bg-gray-100 py-8 lg:py-12 px-10 lg:px-20">
      <!-- 로고 -->
      <div class="flex justify-start px-4 mb-6 lg:mb-8">
        <img
          src="/src/assets/svg/lion_black.svg"
          alt="Lion Logo"
          class="w-[50px] h-[20px] lg:w-[70px] lg:h-[30px]"
        />
      </div>

      <!-- Bootcamp 제목 -->
      <div
        class="text-left text-xl font-bold text-black mb-4 text-[13px] lg:text-[19px] px-4"
      >
        Likelion Bootcamp Frontend 13th
      </div>

      <!-- 이름 목록 -->
      <div class="flex justify-start space-x-2 lg:space-x-4 px-4 mb-6">
        <div class="flex flex-col items-start">
          <span class="text-[9px] lg:text-[11px] font-semibold text-black"
            >배희정</span
          >
        </div>
        <div class="flex flex-col items-start">
          <span class="text-[9px] lg:text-[11px] font-semibold text-black"
            >배동초</span
          >
        </div>
        <div class="flex flex-col items-start">
          <span class="text-[9px] lg:text-[11px] font-semibold text-black"
            >이훈진</span
          >
        </div>
        <div class="flex flex-col items-start">
          <span class="text-[9px] lg:text-[11px] font-semibold text-black"
            >강석현</span
          >
        </div>
      </div>

      <!-- 소셜 아이콘 및 Copy~ -->
      <div
        class="flex items-center justify-between lg:justify-between px-4 mt-10"
      >
        <!-- 소셜 아이콘 -->
        <div class="flex justify-start space-x-4 lg:space-x-6">
          <!-- GitHub -->
          <div>
            <img
              src="/src/assets/svg/icon_github.svg"
              alt="GitHub"
              class="w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]"
            />
          </div>
          <!-- Instagram -->
          <div>
            <img
              src="/src/assets/svg/icon_instagram.svg"
              alt="Instagram"
              class="w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]"
            />
          </div>
          <!-- YouTube -->
          <div>
            <img
              src="/src/assets/svg/icon_youtube.svg"
              alt="YouTube"
              class="w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]"
            />
          </div>
          <!-- Facebook -->
          <div>
            <img
              src="/src/assets/svg/icon_facebook.svg"
              alt="Facebook"
              class="w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]"
            />
          </div>
        </div>
      </div>
      <!-- Copy Likelion -->
      <div class="mt-8 lg:mt-6 mb-0 text-center">
        <span class="text-[8px] lg:text-[16px] text-black">
          Copyright Likelion Bootcamp Frontend 13th All rights reserved.
        </span>
      </div>
    </footer>

    <!--==========================-->
    <!--==========================-->
  </body>
</html>
