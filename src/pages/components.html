<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Components | Hi</title>
    <link rel="icon" href="/public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      href="/font/woff2/PretendardVariable.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" as="style" href="/font/pretendardvariable.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <!-- 팀 소개 페이지 컴포넌트 -->
    <h1 class="font-extrabold text-2xl mt-8">Team Page Hero</h1>
    <section
      class="team-hero bg-main px-8 py-[2.8125rem] flex justify-center gap-5"
    >
      <div class="logo w-(--logo-big-size) shrink-0">
        <img src="/src/assets/svg/logo_white.svg" alt="Hi logo" />
      </div>
      <div class="title text-white font-bold">
        <div class="sub-title text-team-hero-sub-title max-lg:text-[2.5rem]">
          4명의 색다른 매력,
        </div>
        <div
          class="main-title text-team-hero-title pl-[5.75rem] max-lg:text-[3.75rem]"
        >
          지금 소개합니다!
        </div>
      </div>
    </section>

    <h1 class="font-extrabold text-2xl mt-8">Team Page Introduce</h1>
    <section
      class="team-introduce flex justify-center gap-[3.5625rem] px-8 py-6 max-w-(--team-intro-max-width) h-(--team-intro-height) bg-[#AAC0FF] hover:bg-white rounded-(--basic-radius) shadow-(--basic-shadow) duration-300 ease-in-out"
    >
      <div
        class="character w-(--team-character-width) hover:w-(--team-character-width-hover) shrink-0"
      >
        <img src="/src/assets/svg/lion_black.svg" alt="캐릭터" />
      </div>
      <div class="content text-team-introduce-content font-bold">
        5조 팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다. 5조
        팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다. 5조 팀원 ㅇㅇㅇ입니다.
      </div>
    </section>
  </body>
</html>
