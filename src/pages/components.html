  <body class="bg-[#ffffff] m-8 min-h-screen space-y-10">

    <section

    >
      <article
        class="grid grid-cols-[3fr_1fr] max-[520px]:grid-cols-[1fr] p-4 h-full gap-6"

        <!-- 텍스트 섹션 -->

            class="text-gray-400 text-[0.8rem] sm:text-[1.5rem] lg:text-[2rem] xl:text-[2.5rem]"

            우리를 소개합니다!!

            class="text-white text-[0.8rem] sm:text-[1rem] lg:text-xl xl:text-2xl"

            class="w-[80px] sm:w-[100px] lg:w-[150px] xl:w-[180px] h-auto"
          />
