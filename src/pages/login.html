<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Hi</title>
    <link rel="icon" href="/public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      href="/font/woff2/PretendardVariable.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" as="style" href="/font/pretendardvariable.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="wrap">
      <!--==============================================================================-->
      <!--                                 공통 헤더 컴포넌트                               -->
      <!--==============================================================================-->
      <header
        class="sticky top-0 z-50 flex justify-between items-center w-full h-[var(--header-height)] px-4 lg:px-[70px] bg-[rgba(255,255,255,0.8)] transition-all duration-300 peer"
      >
        <!-- 로고 & 햄버거 버튼 컨테이너 (모바일) -->
        <div class="flex items-center w-full lg:w-auto">
          <!-- 로고 -->
          <div>
            <a href="/">
              <img
                src="/src/assets/svg/logo_black.svg"
                alt="HI Logo"
                class="w-(--logo-width-size) h-(--logo-height-size)"
              />
            </a>
          </div>

          <!-- 햄버거 버튼 -->
          <div
            class="lg:hidden ml-auto relative flex items-center justify-center w-[40px] h-[70px]"
          >
            <input
              type="checkbox"
              id="menuToggle"
              class="hidden peer"
              aria-hidden="true"
            />
            <label
              for="menuToggle"
              class="block p-2 cursor-pointer"
              aria-label="모바일 메뉴 토글"
            >
              <span
                class="block w-6 h-[2px] bg-black mb-1.5 transition-all duration-300 peer-checked:rotate-45 peer-checked:translate-y-[5px]"
              ></span>
              <span
                class="block w-6 h-[2px] bg-black mb-1.5 transition-all duration-300 peer-checked:rotate-45 peer-checked:translate-y-[5px]"
              ></span>
              <span
                class="block w-6 h-[2px] bg-black mb-1.5 transition-all duration-300 peer-checked:rotate-45 peer-checked:translate-y-[5px]"
              ></span>
            </label>

            <!-- 모바일 토글 메뉴 -->
            <nav
              class="fixed top-[3rem] right-0 w-[150px] h-auto bg-transparent peer-checked:bg-white shadow-lg p-6 transform translate-x-full transition-all duration-300 peer-checked:translate-x-0 lg:hidden z-[60]"
              aria-label="모바일 메뉴"
            >
              <div class="space-y-5">
                <a href="./plan.html" class="block text-lg hover:text-[#205AFF]"
                  >Plan</a
                >
                <a
                  href="./about.html"
                  class="block text-lg hover:text-[#205AFF]"
                  >Team</a
                >
                <a
                  href="./login.html"
                  class="block text-lg hover:text-[#205AFF]"
                  >Login</a
                >
              </div>
            </nav>
          </div>
        </div>

        <!-- 메뉴 영역 (데스크톱) -->
        <nav
          class="hidden lg:flex lg:w-[calc(100%-200px)] justify-end items-center space-x-14 text-[#312F2F] text-header-link"
          aria-label="주 메뉴"
        >
          <a
            href="./plan.html"
            class="hover:text-[#205AFF] opacity-80 transition-all duration-300 ease-in-out"
            >Plan</a
          >
          <a
            href="./about.html"
            class="hover:text-[#205AFF] opacity-80 transition-all duration-300 ease-in-out"
            >Team</a
          >
          <a
            class="font-semibold text-white bg-[#312F2F] hover:bg-main rounded-(--btn-radius) w-(--header-btn-width) h-(--header-btn-height) flex items-center justify-center text-header-btn transition-all duration-300 ease-in-out"
            href="./login.html"
          >
            Login
          </a>
        </nav>
      </header>
      <!-- ============================================================================================== -->
      <!-- ============================================================================================== -->

      <!--===============================================================================================-->
      <!--                                            로그인 컴포넌트                                     -->
      <!--===============================================================================================-->
      <main
        class="flex flex-col justify-center items-center max-w-[1024px] mx-auto mt-[4rem] mb-[24rem]"
      >
        <div class="w-full max-w-[25rem] p-7">
          <a href="/">
            <img
              src="../assets/svg/logo_black.svg"
              alt="하이 서비스 메인 로고"
              class="lg:w-(--logo-sm-width-size) lg:h-(--logo-sm-height-size) w-(--logo-sm-mobile-width-size) h-(--logo-sm-mobile-height-size) my-10 cursor-pointer mx-auto"
            />
          </a>
          <form action="#" method="post" class="m-auto">
            <div>
              <label for="email" class="sr-only">이메일</label>
              <input
                id="email"
                type="email"
                placeholder="이메일"
                aria-label="이메일 입력"
                required
                class="w-full max-w-(--input-width) h-[3.125rem] lg:h-(--input-height) border-2 border-gray-300 rounded-(--basic-radius) indent-(--input-padding) mt-1.5 focus:border-main focus:outline-none"
              />
            </div>
            <div>
              <label for="password" class="sr-only">비밀번호</label>
              <input
                id="password"
                type="password"
                placeholder="비밀번호"
                required
                aria-label="비밀번호 입력"
                class="w-full max-w-(--input-width) h-[3.125rem] lg:h-(--input-height) border-2 border-gray-300 rounded-(--basic-radius) indent-(--input-padding) mt-1.5 focus:border-main focus:outline-none"
              />
            </div>
            <div
              class="flex justify-between mt-2 mb-2 font-light text-[.875rem] lg:text-[1rem]"
            >
              <a
                href="./password-reset.html"
                class="text-gray-400 font-regular hover:text-gray-500"
                >비밀번호 재설정</a
              >
              <a
                href="./sign-up.html"
                class="text-gray-400 font-regular hover:text-gray-500"
                >회원가입</a
              >
            </div>
            <button
              type="submit"
              class="w-full max-w-(--login-btn-width) h-(--login-btn-height) lg:h-(--login-btn-height) bg-main rounded-(--btn-radius) text-white text-[1.25rem] font-semibold hover:cursor-pointer hover:bg-blue-700 transition-all duration-300 ease-in-out"
            >
              로그인
            </button>
          </form>
          <div>
            <p class="font-medium text-gray-500 text-center mt-10">
              SNS 계정으로 간편 로그인 및 회원가입
            </p>
            <div class="flex justify-around mt-5 mx-10">
              <a href="https://www.facebook.com/?locale=ko_KR">
                <img
                  src="../assets/svg/icon_facebook.svg"
                  alt="페이스북 로그인"
                  class="w-(--login-icon-width)"
                />
              </a>
              <a
                href="https://www.kakaocorp.com/page/service/service/KakaoTalk"
              >
                <img
                  src="../assets/svg/icon_kakao.svg"
                  alt="카카오톡 로그인"
                  class="w-(--login-icon-width)"
                />
              </a>
              <a href="https://nid.naver.com/nidlogin.login">
                <img
                  src="../assets/svg/icon_naver.svg"
                  alt="네이버 로그인"
                  class="w-(--login-icon-width)"
                />
              </a>
            </div>
          </div>
        </div>
      </main>
      <!-- ============================================================================================== -->
      <!-- ============================================================================================== -->

      <!--===============================================================================================-->
      <!--                                          공통 Footer 컴포넌트                                  -->
      <!--===============================================================================================-->

      <footer class="bg-gray py-8 lg:py-12 px-10 lg:px-20">
        <!-- 로고 -->
        <div class="flex justify-start px-4 mb-6 lg:mb-8">
          <img
            src="/src/assets/svg/lion_black.svg"
            alt="LikeLion 부트 캠프 로고 Lion Logo"
            class="w-(--footer-logo-width) h-(--footer-logo-height) lg:w-(--fooger-logo-lg-width) lg:h-(--footer-logo-lg-height)"
          />
        </div>

        <!-- Bootcamp 제목 -->
        <div
          class="text-left text-xl font-bold text-black mb-4 text-[13px] lg:text-[19px] px-4"
        >
          Likelion Bootcamp Frontend 13th
        </div>

        <!-- 이름 목록 -->
        <ul class="flex justify-start space-x-2 lg:space-x-4 px-4 mb-6">
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >배희정</span
            >
          </li>
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >배동초</span
            >
          </li>
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >이훈진</span
            >
          </li>
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >강석현</span
            >
          </li>
        </ul>

        <!-- 소셜 아이콘 및 Copy~ -->
        <div
          class="flex items-center justify-between lg:justify-between px-4 mt-10"
        >
          <!-- 소셜 아이콘 -->
          <div class="flex justify-start space-x-3 lg:space-x-4">
            <!-- GitHub -->
            <div>
              <a href="https://github.com/FRONTENDBOOTCAMP-13th">
                <img
                  src="/src/assets/svg/icon_github.svg"
                  alt="GitHub 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
            <!-- Instagram -->
            <div>
              <a href="https://www.instagram.com/">
                <img
                  src="/src/assets/svg/icon_instagram.svg"
                  alt="Instagram 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
            <!-- YouTube -->
            <div>
              <a href="https://www.youtube.com/">
                <img
                  src="/src/assets/svg/icon_youtube.svg"
                  alt="YouTube 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
            <!-- Facebook -->
            <div>
              <a href="https://www.facebook.com/">
                <img
                  src="/src/assets/svg/icon_facebook_02.svg"
                  alt="Facebook 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
          </div>
        </div>
        <!-- Copy Likelion -->
        <div class="mt-8 lg:mt-6 mb-0 text-center">
          <span
            class="text-[.833rem] font-regular lg:text-[0.75rem] text-black"
          >
            Copyright Likelion Bootcamp Frontend 13th All rights reserved.
          </span>
        </div>
      </footer>

      <!-- =============================================================================================== -->
      <!-- =============================================================================================== -->
    </div>
  </body>
</html>
