<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FindPW | Hi</title>
    <link rel="icon" href="/public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      href="/font/woff2/PretendardVariable.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" as="style" href="/font/pretendardvariable.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="wrap">
      <!--==============================================================================-->
      <!--                                 공통 헤더 컴포넌트                               -->
      <!--==============================================================================-->
      <header
        class="sticky top-0 z-50 flex justify-between items-center w-full h-[var(--header-height)] px-4 lg:px-[70px] bg-[rgba(255,255,255,0.8)] transition-all duration-300"
      >
        <!-- 로고 & 햄버거 버튼 컨테이너 (모바일) -->
        <div class="flex items-center w-full lg:w-auto">
          <!-- 로고 -->
          <div>
            <a href="/">
              <img
                src="/src/assets/svg/logo_black.svg"
                alt="HI Logo"
                class="w-(--logo-width-size) h-(--logo-height-size)"
              />
            </a>
          </div>

          <!-- 햄버거 버튼 -->
          <button
            class="lg:hidden ml-auto flex items-center justify-center w-[40px] h-[70px]"
            aria-label="메뉴 열기/닫기"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              class="w-6 h-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>

        <!-- 메뉴 영역 (데스크톱) -->
        <nav
          class="hidden lg:flex lg:w-[calc(100%-200px)] justify-end items-center space-x-14 text-[#312F2F] text-header-link"
          aria-label="주 메뉴"
        >
          <a
            href="./plan.html"
            class="hover:text-[#205AFF] opacity-70 transition-all duration-300 ease-in-out"
            >Plan</a
          >
          <a
            href="./about.html"
            class="hover:text-[#205AFF] opacity-70 transition-all duration-300 ease-in-out"
            >Team</a
          >
          <a
            class="font-semibold text-white bg-[#312F2F] hover:bg-main rounded-(--btn-radius) w-(--header-btn-width) h-(--header-btn-height) flex items-center justify-center text-header-btn"
            href="./login.html"
          >
            Login
          </a>
        </nav>
      </header>
      <!-- ============================================================================================== -->
      <!-- ============================================================================================== -->

      <!-- ============================================================================================== -->
      <!--                                             비밀번호 재설정                                     -->
      <!-- ============================================================================================== -->
      <main class="flex flex-col items-center justify-center mt-20 mb-55">
        <!-- 로고 -->
        <a href="/">
          <img
            src="../assets/svg/logo_black.svg"
            alt="로고"
            class="lg:w-(--logo-sm-width-size) lg:h-(--logo-sm-height-size) w-(--logo-sm-mobile-width-size) h-(--logo-sm-mobile-height-size) my-10 cursor-pointer"
          />
        </a>
        <h1 class="mb-3 text-2xl text-main">비밀번호 재설정</h1>
        <p class="text-center sm:border-b-5 border-main py-3 font-medium">
          입력하신 이메일 주소로 임시 비밀번호 변경 정보를 발송합니다.
        </p>
        <div
          class="lg:min-w-(--input-width) sm:min-w-(--input-width) mt-10 sm:mt-12"
        >
          <label
            for="email"
            class="text-main font-bold text-[1.2rem] block text-left"
            >성함</label
          >
          <input
            type="name"
            placeholder="성함"
            required
            class="w-full max-w-(--input-width) h-[3.125rem] lg:h-(--input-height) border-2 border-gray-300 rounded-(--basic-radius) indent-(--input-padding) mt-1.5 focus:border-main focus:outline-none"
          />
        </div>
        <div class="sm:min-w-(--input-width) lg:min-w-(--input-width) mt-5">
          <label for="email" class="text-main font-bold text-[1.2rem] block"
            >이메일</label
          >
          <input
            type="email"
            placeholder="이메일"
            required
            class="w-full max-w-(--input-width) h-[3.125rem] lg:h-(--input-height) border-2 border-gray-300 rounded-(--basic-radius) indent-(--input-padding) mt-1.5 focus:border-main focus:outline-none"
          />
        </div>
        <!-- Modal 구현영역 -->
        <div class="my-5">
          <!-- 숨겨진 체크박스 (토글 역할) -->
          <input type="checkbox" id="modal-toggle" class="hidden peer" />

          <!-- 트리거 버튼 -->
          <div class="mt-10">
            <label
              tabindex="0"
              for="modal-toggle"
              class="px-[4.277rem] sm:px-[9.36rem] py-[0.97rem] sm:py-[0.97rem] rounded-(--basic-radius) cursor-pointer text-center bg-blue-600 text-white hover:bg-blue-700 transition"
            >
              비밀번호 재설정
            </label>
          </div>
          <!-- 모달 배경 (체크되었을 때 보여짐) -->
          <div
            class="fixed inset-0 bg-black/50 hidden peer-checked:block z-1"
          ></div>

          <!-- 모달 박스 -->
          <div
            class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-lg max-h-[20rem] px-20 py-10 bg-white rounded-(--basic-radius) shadow-lg hidden peer-checked:flex flex-col z-2"
          >
            <!-- 이용약관 Text 영역 -->
            <div class="text-center">
              <h2 class="text-2xl font-bold mb-4">이메일 발송 안내</h2>
              <p class="my-10 font-medium">
                이메일로 비밀번호 재설정 링크를 보내드렸습니다. 해당 링크를
                클릭하여 비밀번호 변경을 완료해 주세요.
              </p>
            </div>

            <!-- 닫기 버튼 -->
            <label
              for="modal-toggle"
              class="cursor-pointer text-center py-3 bg-blue-600 text-white rounded-(--basic-radius) hover:bg-blue-700 transition"
            >
              확인
            </label>
          </div>
        </div>
      </main>
      <!-- ============================================================================================== -->
      <!-- ============================================================================================== -->

      <!--===============================================================================================-->
      <!--                                          공통 Footer 컴포넌트                                  -->
      <!--===============================================================================================-->

      <footer class="bg-gray py-8 lg:py-12 px-10 lg:px-20">
        <!-- 로고 -->
        <div class="flex justify-start px-4 mb-6 lg:mb-8">
          <img
            src="/src/assets/svg/lion_black.svg"
            alt="LikeLion 부트 캠프 로고 Lion Logo"
            class="w-(--footer-logo-width) h-(--footer-logo-height) lg:w-(--fooger-logo-lg-width) lg:h-(--footer-logo-lg-height)"
          />
        </div>

        <!-- Bootcamp 제목 -->
        <div
          class="text-left text-xl font-bold text-black mb-4 text-[13px] lg:text-[19px] px-4"
        >
          Likelion Bootcamp Frontend 13th
        </div>

        <!-- 이름 목록 -->
        <ul class="flex justify-start space-x-2 lg:space-x-4 px-4 mb-6">
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >배희정</span
            >
          </li>
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >배동초</span
            >
          </li>
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >이훈진</span
            >
          </li>
          <li class="flex flex-col items-start">
            <span
              class="text-[.833rem] lg:text-[.75rem] font-semibold text-black"
              >강석현</span
            >
          </li>
        </ul>

        <!-- 소셜 아이콘 및 Copy~ -->
        <div
          class="flex items-center justify-between lg:justify-between px-4 mt-10"
        >
          <!-- 소셜 아이콘 -->
          <div class="flex justify-start space-x-3 lg:space-x-4">
            <!-- GitHub -->
            <div>
              <a href="https://github.com/FRONTENDBOOTCAMP-13th">
                <img
                  src="/src/assets/svg/icon_github.svg"
                  alt="GitHub 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
            <!-- Instagram -->
            <div>
              <a href="https://www.instagram.com/">
                <img
                  src="/src/assets/svg/icon_instagram.svg"
                  alt="Instagram 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
            <!-- YouTube -->
            <div>
              <a href="https://www.youtube.com/">
                <img
                  src="/src/assets/svg/icon_youtube.svg"
                  alt="YouTube 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
            <!-- Facebook -->
            <div>
              <a href="https://www.facebook.com/">
                <img
                  src="/src/assets/svg/icon_facebook_02.svg"
                  alt="Facebook 바로가기"
                  class="w-(--footer-icon-size) h-(--footer-icon-size) lg:w-(--footer-icon-large-size) lg:h-(--footer-icon-large-size)"
              /></a>
            </div>
          </div>
        </div>
        <!-- Copy Likelion -->
        <div class="mt-8 lg:mt-6 mb-0 text-center">
          <span
            class="text-[.833rem] font-regular lg:text-[0.75rem] text-black"
          >
            Copyright Likelion Bootcamp Frontend 13th All rights reserved.
          </span>
        </div>
      </footer>

      <!-- =============================================================================================== -->
      <!-- =============================================================================================== -->
    </div>
  </body>
</html>
