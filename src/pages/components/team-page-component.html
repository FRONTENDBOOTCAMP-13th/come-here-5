<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team Components | Hi</title>
    <link rel="icon" href="/public/favicon.svg" />
    <link
      rel="preload"
      as="font"
      href="/font/woff2/PretendardVariable.woff2"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" as="style" href="/font/pretendardvariable.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="wrap p-10">
      <h1 class="text-2xl mb-10">Team Hero-Section 컴포넌트</h1>
      <section
        class="team-hero bg-main px-8 py-[2.8125rem] flex justify-center gap-5 h-[200px] md:h-[350px]"
      >
        <div
          class="logo w-[6rem] content-center md:w-(--logo-big-size) lg:content-start lg:mt-3 shrink-0 animate-floating"
        >
          <img src="/src/assets/svg/logo_white.svg" alt="Hi logo" />
        </div>
        <div class="content-center title animate-floating">
          <div
            class="sub-title text-3xl md:text-[2.5rem] lg:text-team-hero-sub-title leading-[1.5] text-white"
          >
            4명의 색다른 매력,
          </div>
          <div
            class="main-title text-4xl md:text-[3.4rem] md:pl-[5.75rem] lg:text-team-hero-title leading-[1.5] text-white"
          >
            지금 소개합니다!
          </div>
        </div>
      </section>
      <h1 class="text-2xl my-10">Team 팀원 소개 컴포넌트</h1>
      <section
        class="team-introduce flex justify-center md:gap-[3.5625rem] px-4 md:px-8 h-(--team-intro-height) bg-[#AAC0FF] hover:bg-white rounded-(--basic-radius) shadow-(--basic-shadow) duration-500 ease-in-out hover:items-center"
      >
        <div class="character shrink-0">
          <img
            src="/src/assets/img/memo/memo_bhj.png"
            alt="배희정 팀원 캐릭터"
          />
        </div>
        <div
          class="content-center py-6 text-xl font-medium content md:text-team-introduce-content text-text-contents"
        >
          안녕하세요! 이리5시조 팀원 배희정입니다. 전시회나 공연 관람을
          좋아하며, 집에서 음악을 들으며 책 읽는 시간을 즐깁니다. 개발을 하면서
          문제가 생기면 끝까지 해결 방법을 찾아내려고 노력하는 편입니다. 멋사
          13기에서 협업의 중요성을 배우고, 실무에 도움이 되는 경험을 쌓는 것이
          목표입니다. 남은 기간 동안 동기들과 함께 성장하며, 사용자 입장에서
          생각할 줄 아는 프론트엔드 개발자가 되고 싶습니다! 👩‍💻
        </div>
      </section>
    </div>
  </body>
</html>
